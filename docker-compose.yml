services:
  scriva:
    build: .
    image: ghcr.io/srjn45/scriva:dev
    container_name: scriva
    restart: unless-stopped
    ports:
      - "5433:5433"   # gRPC (TCP)
      - "8080:8080"   # REST gateway
    environment:
      # API key for both gRPC and REST; clients must send the same value.
      SCRIVA_API_KEY: ${SCRIVA_API_KEY:-dev-key}
    # The image entrypoint is ["scriva", "serve", "--data", "/data"], which
    # already listens on :5433 (gRPC) and :8080 (REST) on all interfaces.
    volumes:
      - scriva-data:/data

volumes:
  scriva-data:
