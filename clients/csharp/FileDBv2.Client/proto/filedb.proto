syntax = "proto3";

package filedb.v1;

option go_package = "github.com/srjn45/filedbv2/internal/pb/proto";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

service FileDB {
  // --- Collection management ---

  rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse) {
    option (google.api.http) = {
      post: "/v1/collections"
      body: "*"
    };
  }

  rpc DropCollection(DropCollectionRequest) returns (DropCollectionResponse) {
    option (google.api.http) = {
      delete: "/v1/collections/{name}"
    };
  }

  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse) {
    option (google.api.http) = {
      get: "/v1/collections"
    };
  }

  // --- CRUD ---

  rpc Insert(InsertRequest) returns (InsertResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/records"
      body: "*"
    };
  }

  rpc InsertMany(InsertManyRequest) returns (InsertManyResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/records/batch"
      body: "*"
    };
  }

  rpc FindById(FindByIdRequest) returns (FindResponse) {
    option (google.api.http) = {
      get: "/v1/{collection}/records/{id}"
    };
  }

  // Server-streaming: results are streamed back one by one.
  rpc Find(FindRequest) returns (stream FindResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/records/find"
      body: "*"
    };
  }

  rpc Update(UpdateRequest) returns (UpdateResponse) {
    option (google.api.http) = {
      put: "/v1/{collection}/records/{id}"
      body: "*"
    };
  }

  rpc Delete(DeleteRequest) returns (DeleteResponse) {
    option (google.api.http) = {
      delete: "/v1/{collection}/records/{id}"
    };
  }

  // --- Secondary indexes ---

  rpc EnsureIndex(EnsureIndexRequest) returns (EnsureIndexResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/indexes"
      body: "*"
    };
  }

  rpc DropIndex(DropIndexRequest) returns (DropIndexResponse) {
    option (google.api.http) = {
      delete: "/v1/{collection}/indexes/{field}"
    };
  }

  rpc ListIndexes(ListIndexesRequest) returns (ListIndexesResponse) {
    option (google.api.http) = {
      get: "/v1/{collection}/indexes"
    };
  }

  // --- Transactions ---

  rpc BeginTx(BeginTxRequest) returns (BeginTxResponse);
  rpc CommitTx(CommitTxRequest) returns (CommitTxResponse);
  rpc RollbackTx(RollbackTxRequest) returns (RollbackTxResponse);

  // --- Watch (server-streaming change feed) ---

  rpc Watch(WatchRequest) returns (stream WatchEvent) {
    option (google.api.http) = {
      post: "/v1/{collection}/watch"
      body: "*"
    };
  }

  // --- Stats ---

  rpc CollectionStats(CollectionStatsRequest) returns (CollectionStatsResponse) {
    option (google.api.http) = {
      get: "/v1/{collection}/stats"
    };
  }
}

// ---------------------------------------------------------------------------
// Shared types
// ---------------------------------------------------------------------------

message Record {
  uint64                    id            = 1;
  google.protobuf.Struct    data          = 2;
  google.protobuf.Timestamp date_added    = 3;
  google.protobuf.Timestamp date_modified = 4;
}

// A composable filter node.
message Filter {
  oneof kind {
    FieldFilter field  = 1;
    AndFilter   and    = 2;
    OrFilter    or     = 3;
  }
}

message FieldFilter {
  string field = 1;
  FilterOp op  = 2;
  string value = 3; // JSON-encoded value for comparison
}

enum FilterOp {
  FILTER_OP_UNSPECIFIED = 0;
  EQ                    = 1;  // equal
  NEQ                   = 2;  // not equal
  GT                    = 3;  // greater than
  GTE                   = 4;  // greater than or equal
  LT                    = 5;  // less than
  LTE                   = 6;  // less than or equal
  CONTAINS              = 7;  // string contains
  REGEX                 = 8;  // regular expression match
}

message AndFilter { repeated Filter filters = 1; }
message OrFilter  { repeated Filter filters = 1; }

// ---------------------------------------------------------------------------
// Collection management
// ---------------------------------------------------------------------------

message CreateCollectionRequest {
  string name = 1;
}
message CreateCollectionResponse {
  string name       = 1;
  string created_at = 2;
}

message DropCollectionRequest  { string name = 1; }
message DropCollectionResponse { bool   ok   = 1; }

message ListCollectionsRequest  {}
message ListCollectionsResponse { repeated string names = 1; }

// ---------------------------------------------------------------------------
// CRUD
// ---------------------------------------------------------------------------

message InsertRequest {
  string                 collection = 1;
  google.protobuf.Struct data       = 2;
}
message InsertResponse {
  uint64 id         = 1;
  string date_added = 2;
}

message InsertManyRequest {
  string                          collection = 1;
  repeated google.protobuf.Struct records    = 2;
}
message InsertManyResponse {
  repeated uint64 ids = 1;
}

message FindByIdRequest {
  string collection = 1;
  uint64 id         = 2;
}

message FindRequest {
  string  collection = 1;
  Filter  filter     = 2;
  uint32  limit      = 3; // 0 = no limit
  uint32  offset     = 4;
  string  order_by   = 5; // field name
  bool    descending = 6;
}

message FindResponse {
  Record record = 1;
}

message UpdateRequest {
  string                 collection = 1;
  uint64                 id         = 2;
  google.protobuf.Struct data       = 3;
}
message UpdateResponse {
  uint64 id            = 1;
  string date_modified = 2;
}

message DeleteRequest {
  string collection = 1;
  uint64 id         = 2;
}
message DeleteResponse { bool ok = 1; }

// ---------------------------------------------------------------------------
// Secondary indexes
// ---------------------------------------------------------------------------

message EnsureIndexRequest  { string collection = 1; string field = 2; }
message EnsureIndexResponse { string collection = 1; string field = 2; }

message DropIndexRequest    { string collection = 1; string field = 2; }
message DropIndexResponse   { bool   ok         = 1; }

message ListIndexesRequest  { string collection = 1; }
message ListIndexesResponse { repeated string fields = 1; }

// ---------------------------------------------------------------------------
// Transactions
// ---------------------------------------------------------------------------

message BeginTxRequest   { string collection = 1; }
message BeginTxResponse  { string tx_id      = 1; }

message CommitTxRequest   { string tx_id = 1; }
message CommitTxResponse  { bool   ok    = 1; }

message RollbackTxRequest  { string tx_id = 1; }
message RollbackTxResponse { bool   ok    = 1; }

// ---------------------------------------------------------------------------
// Watch
// ---------------------------------------------------------------------------

enum WatchOp {
  WATCH_OP_UNSPECIFIED = 0;
  INSERTED             = 1;
  UPDATED              = 2;
  DELETED              = 3;
}

message WatchRequest {
  string collection = 1;
  Filter filter     = 2; // optional: only receive events matching this filter
}

message WatchEvent {
  WatchOp                   op         = 1;
  string                    collection = 2;
  Record                    record     = 3;
  google.protobuf.Timestamp ts         = 4;
}

// ---------------------------------------------------------------------------
// Stats
// ---------------------------------------------------------------------------

message CollectionStatsRequest  { string collection = 1; }
message CollectionStatsResponse {
  string collection    = 1;
  uint64 record_count  = 2;
  uint64 segment_count = 3;
  uint64 dirty_entries = 4;
  uint64 size_bytes    = 5;
}
