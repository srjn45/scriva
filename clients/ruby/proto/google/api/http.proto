// Minimal stub of google/api/http.proto sufficient for proto-loader dynamic loading.
// Only the message definitions used by annotations.proto are included.
syntax = "proto3";

package google.api;

option go_package = "google.golang.org/genproto/googleapis/api/annotations;annotations";
option java_multiple_files = true;
option java_package = "com.google.api";

message HttpRule {
  string selector = 1;
  oneof pattern {
    string get    = 2;
    string put    = 3;
    string post   = 4;
    string delete = 5;
    string patch  = 6;
    CustomHttpPattern custom = 8;
  }
  string body = 7;
  string response_body = 12;
  repeated HttpRule additional_bindings = 11;
}

message CustomHttpPattern {
  string kind = 1;
  string path = 2;
}
