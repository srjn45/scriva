name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate proto
        run: buf generate

      - name: Verify generated code is up to date
        run: git diff --exit-code internal/pb/

      - name: go vet
        run: go vet ./...

      - name: Dependency-hygiene check (embeddable engine)
        run: make deps-check

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

      - name: Test (with race detector)
        run: go test ./... -race -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build binaries
        run: |
          go build -trimpath -ldflags "-s -w" -o /dev/null ./cmd/scriva
          go build -trimpath -ldflags "-s -w" -o /dev/null ./cmd/scriva-cli
