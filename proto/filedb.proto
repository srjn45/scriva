syntax = "proto3";

package filedb.v1;

option go_package = "github.com/srjn45/filedbv2/internal/pb/proto";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

service FileDB {
  // --- Collection management ---

  rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse) {
    option (google.api.http) = {
      post: "/v1/collections"
      body: "*"
    };
  }

  rpc DropCollection(DropCollectionRequest) returns (DropCollectionResponse) {
    option (google.api.http) = {
      delete: "/v1/collections/{name}"
    };
  }

  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse) {
    option (google.api.http) = {
      get: "/v1/collections"
    };
  }

  // --- CRUD ---

  rpc Insert(InsertRequest) returns (InsertResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/records"
      body: "*"
    };
  }

  rpc InsertMany(InsertManyRequest) returns (InsertManyResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/records/batch"
      body: "*"
    };
  }

  rpc FindById(FindByIdRequest) returns (FindResponse) {
    option (google.api.http) = {
      get: "/v1/{collection}/records/{id}"
    };
  }

  // Server-streaming: results are streamed back one by one.
  rpc Find(FindRequest) returns (stream FindResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/records/find"
      body: "*"
    };
  }

  rpc Update(UpdateRequest) returns (UpdateResponse) {
    option (google.api.http) = {
      put: "/v1/{collection}/records/{id}"
      body: "*"
    };
  }

  rpc Delete(DeleteRequest) returns (DeleteResponse) {
    option (google.api.http) = {
      delete: "/v1/{collection}/records/{id}"
    };
  }

  // --- Keyed CRUD, Upsert & compare-and-swap (N1) ---
  //
  // These map straight onto the embedded engine's keyed operations, giving
  // network clients natural (caller-supplied) string keys, upsert, and
  // optimistic-concurrency updates keyed on a per-record revision (`rev`).

  // Upsert inserts data under key if no live record carries it, or replaces the
  // existing record's data if one does — atomically. Returns the resulting
  // record with its (incremented on replace) revision. This is the keyed-insert
  // path: there is no separate InsertWithKey RPC.
  rpc Upsert(UpsertRequest) returns (UpsertResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/records:upsert"
      body: "*"
    };
  }

  // FindByKey returns the record carrying the caller-supplied string key.
  // A missing key yields NOT_FOUND.
  rpc FindByKey(FindByKeyRequest) returns (FindResponse) {
    option (google.api.http) = {
      get: "/v1/{collection}/keys/{key}"
    };
  }

  // UpdateByKey overwrites the record carrying key, preserving the key itself.
  // A missing key yields NOT_FOUND.
  rpc UpdateByKey(UpdateByKeyRequest) returns (UpdateResponse) {
    option (google.api.http) = {
      put: "/v1/{collection}/keys/{key}"
      body: "*"
    };
  }

  // DeleteByKey removes the record carrying key. A missing key yields NOT_FOUND.
  rpc DeleteByKey(DeleteByKeyRequest) returns (DeleteResponse) {
    option (google.api.http) = {
      delete: "/v1/{collection}/keys/{key}"
    };
  }

  // UpdateIfRev conditionally updates the record carrying key: the write is
  // applied only if the record's current revision equals expected_rev. A stale
  // revision (or a missing key) is a clean no-op reported as swapped=false, not
  // an error.
  rpc UpdateIfRev(UpdateIfRevRequest) returns (UpdateIfRevResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/keys/{key}:cas"
      body: "*"
    };
  }

  // --- Secondary indexes ---

  rpc EnsureIndex(EnsureIndexRequest) returns (EnsureIndexResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/indexes"
      body: "*"
    };
  }

  rpc DropIndex(DropIndexRequest) returns (DropIndexResponse) {
    option (google.api.http) = {
      delete: "/v1/{collection}/indexes/{field}"
    };
  }

  rpc ListIndexes(ListIndexesRequest) returns (ListIndexesResponse) {
    option (google.api.http) = {
      get: "/v1/{collection}/indexes"
    };
  }

  // --- Transactions ---

  rpc BeginTx(BeginTxRequest) returns (BeginTxResponse);
  rpc CommitTx(CommitTxRequest) returns (CommitTxResponse);
  rpc RollbackTx(RollbackTxRequest) returns (RollbackTxResponse);

  // --- Watch (server-streaming change feed) ---

  rpc Watch(WatchRequest) returns (stream WatchEvent) {
    option (google.api.http) = {
      post: "/v1/{collection}/watch"
      body: "*"
    };
  }

  // --- Aggregations (N4) ---

  // Aggregate computes count and numeric aggregations (sum/avg/min/max) over the
  // live records matching the same Filter as Find, optionally grouped by a field.
  // It server-streams one message per group; a plain (ungrouped) aggregation
  // streams a single message. Aggregation runs entirely in the engine — the
  // collection is never materialised on the client.
  rpc Aggregate(AggregateRequest) returns (stream AggregateResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/aggregate"
      body: "*"
    };
  }

  // --- Stats ---

  rpc CollectionStats(CollectionStatsRequest) returns (CollectionStatsResponse) {
    option (google.api.http) = {
      get: "/v1/{collection}/stats"
    };
  }

  // --- Admin ---

  // Compact runs a forced, synchronous compaction pass on a collection and
  // returns only after it completes.
  rpc Compact(CompactRequest) returns (CompactResponse) {
    option (google.api.http) = {
      post: "/v1/{collection}/compact"
      body: "*"
    };
  }

  // Snapshot streams a consistent, gzip-compressed tar archive of the whole
  // database. Restore by extracting it into a data directory. gRPC-only:
  // binary streaming does not map cleanly onto the REST gateway.
  rpc Snapshot(SnapshotRequest) returns (stream SnapshotChunk);

  // --- Replication (R1) ---

  // Replicate is the leader's log-shipping feed: a follower tails committed
  // segment entries, each tagged with a monotonic global sequence number (LSN),
  // and applies them through the normal write path to stay consistent. The
  // follower asks to resume from the last LSN it applied (from_lsn); the leader
  // streams every committed entry with lsn > from_lsn — first any recent history
  // still buffered, then live writes as they commit. A follower too far behind
  // for the leader's in-memory buffer gets FAILED_PRECONDITION and must
  // re-bootstrap from a Snapshot. gRPC-only (binary, long-lived stream).
  rpc Replicate(ReplicateRequest) returns (stream ReplicationRecord);

  // ReplicationStatus reports the leader's current LSN and, for each connected
  // follower, the last LSN shipped to it and its lag. Used for observability and
  // to read the leader's LSN watermark before bootstrapping a fresh follower.
  rpc ReplicationStatus(ReplicationStatusRequest) returns (ReplicationStatusResponse) {
    option (google.api.http) = {
      get: "/v1/replication/status"
    };
  }
}

// ---------------------------------------------------------------------------
// Shared types
// ---------------------------------------------------------------------------

message Record {
  uint64                    id            = 1;
  google.protobuf.Struct    data          = 2;
  google.protobuf.Timestamp date_added    = 3;
  google.protobuf.Timestamp date_modified = 4;
  // Caller-supplied string primary key, empty for records inserted without one.
  string                    key           = 5;
  // Monotonic per-record revision, bumped on every write. Fresh records start
  // at 1. Feed it to UpdateIfRev for optimistic-concurrency updates.
  uint64                    rev           = 6;
}

// A composable filter node.
message Filter {
  oneof kind {
    FieldFilter field  = 1;
    AndFilter   and    = 2;
    OrFilter    or     = 3;
  }
}

message FieldFilter {
  string field = 1;
  FilterOp op  = 2;
  string value = 3; // JSON-encoded value for comparison
}

enum FilterOp {
  FILTER_OP_UNSPECIFIED = 0;
  EQ                    = 1;  // equal
  NEQ                   = 2;  // not equal
  GT                    = 3;  // greater than
  GTE                   = 4;  // greater than or equal
  LT                    = 5;  // less than
  LTE                   = 6;  // less than or equal
  CONTAINS              = 7;  // string contains
  REGEX                 = 8;  // regular expression match
}

message AndFilter { repeated Filter filters = 1; }
message OrFilter  { repeated Filter filters = 1; }

// ---------------------------------------------------------------------------
// Collection management
// ---------------------------------------------------------------------------

message CreateCollectionRequest {
  string name = 1;
  // Optional per-collection default record TTL, in seconds. When > 0, records
  // inserted into this collection expire after this long unless a write
  // supplies its own TTL. Persisted per-collection and overrides the
  // server-wide default. 0 (the default) inherits the server-wide default.
  int64 default_ttl_seconds = 2;
}
message CreateCollectionResponse {
  string name       = 1;
  string created_at = 2;
}

message DropCollectionRequest  { string name = 1; }
message DropCollectionResponse { bool   ok   = 1; }

message ListCollectionsRequest  {}
message ListCollectionsResponse { repeated string names = 1; }

// ---------------------------------------------------------------------------
// CRUD
// ---------------------------------------------------------------------------

message InsertRequest {
  string                 collection = 1;
  google.protobuf.Struct data       = 2;
  // Optional per-record TTL, in seconds. When > 0, the record expires this long
  // after insertion, overriding any collection default. 0 (the default)
  // applies the collection's default TTL, if any.
  int64 ttl_seconds = 3;
  // Optional caller-supplied string primary key (keyed Create). When set, the
  // record is inserted under this key and a key already held by a live record
  // is rejected with ALREADY_EXISTS. Empty (the default) preserves the existing
  // server-assigned-id behaviour. A keyed insert does not participate in
  // transactions or per-record TTL.
  string key = 4;
}
message InsertResponse {
  uint64 id         = 1;
  string date_added = 2;
  // Caller-supplied string key (empty for a keyless insert) and the record's
  // revision. A fresh insert always starts at rev 1.
  string key        = 3;
  uint64 rev        = 4;
}

message InsertManyRequest {
  string                          collection = 1;
  repeated google.protobuf.Struct records    = 2;
  // Optional per-record TTL, in seconds, applied to every record in the batch.
  // Same semantics as InsertRequest.ttl_seconds.
  int64 ttl_seconds = 3;
}
message InsertManyResponse {
  repeated uint64 ids = 1;
}

message FindByIdRequest {
  string collection = 1;
  uint64 id         = 2;
  // Optional field projection: when non-empty, only these top-level fields are
  // returned in the record's data. id, key and rev are always included. Empty
  // (the default) returns the full record. An unknown field is silently omitted.
  repeated string fields = 3;
}

// OrderBy names one sort key and its direction. A Find may carry several, applied
// in order as a lexicographic (multi-field) sort; ties beyond the last key break
// on the record id so the ordering is always total and a keyset cursor is stable.
message OrderBy {
  string field = 1;
  bool   desc  = 2; // false = ascending, true = descending
}

message FindRequest {
  string  collection = 1;
  Filter  filter     = 2;
  uint32  limit      = 3; // 0 = no limit
  uint32  offset     = 4;
  // Deprecated single-field sort. Superseded by order_by_fields (N3): honoured
  // only when order_by_fields is empty, and slated for removal after one release.
  // Migrate `order_by:"f", descending:d` to `order_by_fields:[{field:"f", desc:d}]`.
  string  order_by   = 5 [deprecated = true]; // field name
  bool    descending = 6 [deprecated = true];
  // Optional field projection: when non-empty, only these top-level fields are
  // returned in each record's data. id, key and rev are always included. Empty
  // (the default) returns full records. An unknown field is silently omitted.
  repeated string fields = 7;
  // Opaque keyset (cursor) pagination token (N3). Empty (the default) requests
  // the first page; otherwise it must be a page_token returned by a previous Find
  // and the scan seeks past the rows already returned instead of counting past
  // them (O(page), not O(offset)). Only meaningful with an ordering
  // (order_by_fields or the deprecated order_by); pass the same ordering, filter,
  // and limit on every page. Combine with offset=0 for keyset paging.
  string page_token = 8;
  // Multi-field, per-field-directional sort (N3). When non-empty it supersedes
  // the deprecated scalar order_by/descending. The record id is always the final
  // tiebreaker, so the sort is total and pagination is stable.
  repeated OrderBy order_by_fields = 9;
}

message FindResponse {
  Record record = 1;
  // Next-page cursor (N3). Set on the final streamed message when more rows remain
  // under the requested ordering — feed it back as FindRequest.page_token to fetch
  // the next page. Empty on every message means the last page was reached.
  string page_token = 2;
}

message UpdateRequest {
  string                 collection = 1;
  uint64                 id         = 2;
  google.protobuf.Struct data       = 3;
  // Optional per-record TTL, in seconds, resetting the record's deadline to
  // this long from now. When > 0 it overrides the collection default; 0 (the
  // default) re-applies the collection default TTL, if any.
  int64 ttl_seconds = 4;
}
message UpdateResponse {
  uint64 id            = 1;
  string date_modified = 2;
  // Caller-supplied string key (empty for a keyless update) and the record's
  // revision after the write.
  string key           = 3;
  uint64 rev           = 4;
}

message DeleteRequest {
  string collection = 1;
  uint64 id         = 2;
}
message DeleteResponse { bool ok = 1; }

// ---------------------------------------------------------------------------
// Keyed CRUD, Upsert & compare-and-swap (N1)
// ---------------------------------------------------------------------------

message UpsertRequest {
  string                 collection = 1;
  string                 key        = 2;
  google.protobuf.Struct data       = 3;
}
message UpsertResponse {
  // The resulting record, including its key and (incremented on replace) rev.
  Record record = 1;
}

message FindByKeyRequest {
  string collection = 1;
  string key        = 2;
  // Optional field projection: when non-empty, only these top-level fields are
  // returned in the record's data. id, key and rev are always included. Empty
  // (the default) returns the full record. An unknown field is silently omitted.
  repeated string fields = 3;
}

message UpdateByKeyRequest {
  string                 collection = 1;
  string                 key        = 2;
  google.protobuf.Struct data       = 3;
}

message DeleteByKeyRequest {
  string collection = 1;
  string key        = 2;
}

message UpdateIfRevRequest {
  string                 collection   = 1;
  string                 key          = 2;
  uint64                 expected_rev = 3;
  google.protobuf.Struct data         = 4;
}
message UpdateIfRevResponse {
  // swapped is true when expected_rev matched and the update applied; false —
  // never an error — when the revision was stale or no live record carries key.
  bool   swapped = 1;
  // The resulting record when swapped is true; unset otherwise.
  Record record  = 2;
}

// ---------------------------------------------------------------------------
// Secondary indexes
// ---------------------------------------------------------------------------

message EnsureIndexRequest  { string collection = 1; string field = 2; }
message EnsureIndexResponse { string collection = 1; string field = 2; }

message DropIndexRequest    { string collection = 1; string field = 2; }
message DropIndexResponse   { bool   ok         = 1; }

message ListIndexesRequest  { string collection = 1; }
message ListIndexesResponse { repeated string fields = 1; }

// ---------------------------------------------------------------------------
// Transactions
// ---------------------------------------------------------------------------

message BeginTxRequest   { string collection = 1; }
message BeginTxResponse  { string tx_id      = 1; }

message CommitTxRequest   { string tx_id = 1; }
message CommitTxResponse  { bool   ok    = 1; }

message RollbackTxRequest  { string tx_id = 1; }
message RollbackTxResponse { bool   ok    = 1; }

// ---------------------------------------------------------------------------
// Watch
// ---------------------------------------------------------------------------

enum WatchOp {
  WATCH_OP_UNSPECIFIED = 0;
  INSERTED             = 1;
  UPDATED              = 2;
  DELETED              = 3;
  // OVERFLOW signals that the server dropped events because this subscriber
  // fell behind. The client missed writes and should resync. No record is set.
  OVERFLOW             = 4;
}

message WatchRequest {
  string collection = 1;
  Filter filter     = 2; // optional: only receive events matching this filter
}

message WatchEvent {
  WatchOp                   op         = 1;
  string                    collection = 2;
  Record                    record     = 3;
  google.protobuf.Timestamp ts         = 4;
}

// ---------------------------------------------------------------------------
// Aggregations (N4)
// ---------------------------------------------------------------------------

// AggregateOp names a numeric aggregation to compute per group over the request's
// numeric `field`. COUNT (the per-group record count) is always returned and need
// not be listed. Any of SUM/AVG/MIN/MAX requires `field` to be set.
enum AggregateOp {
  AGGREGATE_OP_UNSPECIFIED = 0;
  AGG_COUNT                = 1; // per-group record count (always returned)
  AGG_SUM                  = 2; // sum of numeric field values
  AGG_AVG                  = 3; // mean of numeric field values
  AGG_MIN                  = 4; // smallest numeric field value
  AGG_MAX                  = 5; // largest numeric field value
}

message AggregateRequest {
  string collection = 1;
  // The same composable filter as Find. Aggregation honours it: only matching
  // live records contribute. Empty (nil) aggregates the whole collection.
  Filter filter = 2;
  // Optional group-by field. When set, one response is streamed per distinct value
  // of this field; records are bucketed by that value. Empty (the default)
  // aggregates the whole filtered set into a single group whose group_value is
  // null.
  string group_by = 3;
  // Numeric field for SUM/AVG/MIN/MAX. Required when any of those aggregations is
  // requested; ignored for a pure count. Only records whose `field` is numeric
  // contribute to the numeric aggregates (AVG divides by that numeric count).
  string field = 4;
  // Which aggregations to compute. COUNT is always returned even if omitted; an
  // empty list yields count-only. SUM/AVG/MIN/MAX require `field`.
  repeated AggregateOp aggregations = 5;
}

// AggregateResponse is one group's result. For a grouped request there is one per
// distinct group_by value, streamed in ascending group order; for an ungrouped
// request there is exactly one, carrying a null group_value.
message AggregateResponse {
  // The group_by field's value for this group, type-preserved (number, string,
  // bool). Null for the whole-set group and for records missing the group field.
  google.protobuf.Value group_value = 1;
  // Records in this group (post-filter). Always populated.
  uint64 count = 2;
  // Numeric aggregates over `field` across this group's records that carried a
  // numeric value. Meaningful only when `numeric` is true.
  double sum = 3;
  double avg = 4;
  double min = 5;
  double max = 6;
  // numeric is true when at least one record in the group carried a numeric
  // `field`; when false the sum/avg/min/max above are zero and meaningless (e.g.
  // a count-only aggregation, or a group where the field was absent/non-numeric).
  bool numeric = 7;
}

// ---------------------------------------------------------------------------
// Stats
// ---------------------------------------------------------------------------

message CollectionStatsRequest  { string collection = 1; }
message CollectionStatsResponse {
  string collection    = 1;
  uint64 record_count  = 2;
  uint64 segment_count = 3;
  uint64 dirty_entries = 4;
  uint64 size_bytes    = 5;
}

// ---------------------------------------------------------------------------
// Admin
// ---------------------------------------------------------------------------

message CompactRequest  { string collection = 1; }
message CompactResponse { bool   ok         = 1; }

message SnapshotRequest {}
message SnapshotChunk   { bytes data = 1; }

// ---------------------------------------------------------------------------
// Replication (R1)
// ---------------------------------------------------------------------------

// ReplicationOp mirrors the committed segment operation being shipped. It is a
// distinct enum from WatchOp because the replication feed carries the full
// entry (revision, expiry, timestamp), not a filtered change notification.
enum ReplicationOp {
  REPLICATION_OP_UNSPECIFIED = 0;
  REP_INSERT                 = 1;
  REP_UPDATE                 = 2;
  REP_DELETE                 = 3; // tombstone: data is unset
}

message ReplicateRequest {
  // Resume point: the leader streams every committed entry whose lsn is strictly
  // greater than from_lsn. A fresh follower that has bootstrapped from a Snapshot
  // passes the leader LSN watermark it captured before the snapshot; a resuming
  // follower passes the highest LSN it has durably applied.
  uint64 from_lsn = 1;
  // Opaque follower identity, surfaced in ReplicationStatus so an operator can
  // tell followers apart. Not required for correctness.
  string follower_id = 2;
}

// ReplicationRecord is one committed entry, shipped verbatim so the follower can
// reproduce the leader's primary and secondary indexes identically.
message ReplicationRecord {
  uint64                    lsn        = 1;
  string                    collection = 2;
  ReplicationOp             op         = 3;
  uint64                    id         = 4;
  uint64                    rev        = 5; // record revision (1 on insert, +1 per update)
  google.protobuf.Struct    data       = 6; // unset for REP_DELETE
  int64                     expires_at = 7; // Unix-nano TTL deadline (0 = never)
  google.protobuf.Timestamp ts         = 8; // the entry's commit timestamp
}

message ReplicationStatusRequest {}

message ReplicationStatusResponse {
  // The highest LSN the leader has committed and assigned. 0 when queried on a
  // follower (which assigns no LSNs of its own).
  uint64 leader_lsn = 1;
  repeated FollowerStatus followers = 2;
  // The highest LSN this node has durably applied as a follower (R2). 0 on a
  // leader. A read-replica client bounds its staleness by comparing this against
  // the leader's leader_lsn: the difference is the follower's replication lag.
  uint64 applied_lsn = 3;
}

message FollowerStatus {
  string                    follower_id  = 1;
  // The last LSN the leader has shipped to this follower. In R1's async model
  // this is the replicated (sent) LSN; a follower-acknowledged applied LSN lands
  // with R2's acknowledged-LSN channel.
  uint64                    acked_lsn    = 2;
  uint64                    lag          = 3; // leader_lsn - acked_lsn
  google.protobuf.Timestamp connected_at = 4;
}
