# FileDB v2 — sample configuration
#
# Copy this file to filedb.yaml and pass it with:
#
#   filedb serve --config filedb.yaml
#
# Every key is optional; omitted keys fall back to the built-in defaults shown
# below. CLI flags always override values set here.

# --- Storage ----------------------------------------------------------------

# Directory where collection segment files and indexes are stored.
data_dir: ./data

# --- Network ----------------------------------------------------------------

# gRPC (TCP) listen address.
grpc_addr: ":5433"

# REST gateway listen address.
rest_addr: ":8080"

# Unix socket path; the local CLI prefers this over TCP when available.
unix_socket: /tmp/filedb.sock

# Prometheus metrics listen address. Leave empty to disable metrics.
metrics_addr: ":9090"

# --- TLS (optional) ---------------------------------------------------------
# Both tls_cert and tls_key must be set to enable TLS on the gRPC listener.

# Path to the PEM-encoded certificate file.
tls_cert: ""

# Path to the PEM-encoded private key file.
tls_key: ""

# --- Auth -------------------------------------------------------------------

# Single API key required from clients. Empty disables authentication.
# Prefer the FILEDB_API_KEY environment variable in production. When set, this
# key is treated as a read-write key named "default".
api_key: ""

# Optional list of scoped API keys. Each key has a name (for logs) and a scope
# of "read" (non-mutating RPCs only) or "read-write" (all RPCs). A read-scoped
# key is rejected with PermissionDenied on writes. These combine with api_key
# above. Send the server SIGHUP to hot-reload this list for rotation — no
# restart needed.
keys: []
#   - key: "reader-secret"
#     name: "analytics"
#     scope: read
#   - key: "writer-secret"
#     name: "backend"
#     scope: read-write

# --- Engine tuning ----------------------------------------------------------

# Maximum size of a segment file in bytes before it is sealed (default: 4 MiB).
segment_max_size: 4194304

# How often the background compactor runs (Go duration, e.g. "5m", "1h30m").
compact_interval: 5m

# Dirty ratio (0–1) that triggers compaction of a collection (default: 0.30).
compact_dirty_pct: 0.30

# --- Durability -------------------------------------------------------------

# Fsync policy:
#   none     — rely on OS flush (fastest, largest crash-loss window)
#   always   — fsync on every write (safest, slowest)
#   interval — fsync on a timer (see sync_interval)
sync_mode: none

# Flush cadence when sync_mode is "interval" (Go duration, e.g. "1s", "500ms").
sync_interval: 1s

# --- Transactions -----------------------------------------------------------

# Reap transactions that have been idle (no staged op) longer than this, to
# bound memory and reserved ids leaked by clients that disconnect without
# committing. Go duration; set "0" to disable expiry entirely.
tx_timeout: 5m

# --- TTL --------------------------------------------------------------------

# Default expiry for inserted records that carry no explicit deadline. After it
# elapses the record is hidden from reads and reclaimed by compaction. Go
# duration (e.g. 24h); set "0" (the default) so records never expire.
default_ttl: 0

# --- Watch ------------------------------------------------------------------

# Per-subscriber event buffer for the Watch change feed. A subscriber that
# fills its buffer receives a single OVERFLOW sentinel (signalling it should
# resync) instead of silently missing events.
watch_buffer_size: 64
