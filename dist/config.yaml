version: 2
project_name: scriva
release:
  github:
    owner: srjn45
    name: FileDBv2
  name_template: '{{.Tag}}'
homebrew_casks:
  - name: scriva
    repository:
      owner: srjn45
      name: homebrew-scriva
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: Brew cask update for {{ .ProjectName }} version {{ .Tag }}
    directory: Casks
    description: ScrivaDB — an embedded append-only document database
    homepage: https://github.com/srjn45/scriva
    ids:
      - default
    binaries:
      - scriva
      - scriva-cli
aurs:
  - name: scriva-bin
    ids:
      - default
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: Update to {{ .Tag }}
    description: ScrivaDB — an embedded append-only document database
    homepage: https://github.com/srjn45/scriva
    license: MIT
    skip_upload: '{{ if .Env.AUR_SSH_PRIVATE_KEY }}false{{ else }}true{{ end }}'
    maintainers:
      - srjn45
    provides:
      - scriva
    conflicts:
      - scriva
    rel: "1"
    git_url: ssh://aur@aur.archlinux.org/scriva-bin.git
    private_key: '{{ .Env.AUR_SSH_PRIVATE_KEY }}'
    goamd64: v1
scoops:
  - name: scriva
    ids:
      - default
    repository:
      owner: srjn45
      name: scoop-scriva
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: Scoop update for {{ .ProjectName }} version {{ .Tag }}
    homepage: https://github.com/srjn45/scriva
    description: ScrivaDB — an embedded append-only document database
    license: MIT
    goamd64: v1
builds:
  - id: scriva
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    go386:
      - sse2
    goarm:
      - "6"
    goarm64:
      - v8.0
    gomips:
      - hardfloat
    goppc64:
      - power8
    goriscv64:
      - rva20u64
    targets:
      - linux_amd64_v1
      - linux_arm64_v8.0
      - darwin_amd64_v1
      - darwin_arm64_v8.0
      - windows_amd64_v1
      - windows_arm64_v8.0
    dir: .
    main: ./cmd/scriva
    binary: scriva
    builder: go
    tool: go
    command: build
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
  - id: scriva-cli
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    go386:
      - sse2
    goarm:
      - "6"
    goarm64:
      - v8.0
    gomips:
      - hardfloat
    goppc64:
      - power8
    goriscv64:
      - rva20u64
    targets:
      - linux_amd64_v1
      - linux_arm64_v8.0
      - darwin_amd64_v1
      - darwin_arm64_v8.0
      - windows_amd64_v1
      - windows_arm64_v8.0
    dir: .
    main: ./cmd/scriva-cli
    binary: scriva-cli
    builder: go
    tool: go
    command: build
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
archives:
  - id: default
    ids:
      - scriva
      - scriva-cli
    builds_info:
      mode: 493
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - src: README.md
      - src: LICENSE
nfpms:
  - file_name_template: '{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    package_name: scriva
    id: packages
    ids:
      - scriva
      - scriva-cli
    formats:
      - deb
      - rpm
    section: database
    vendor: srjn45
    homepage: https://github.com/srjn45/scriva
    maintainer: srjn45
    description: ScrivaDB — an embedded append-only document database
    license: MIT
    bindir: /usr/bin
    libdirs:
      header: /usr/include
      carchive: /usr/lib
      cshared: /usr/lib
srpm:
  nfpmrpm: {}
  package_name: scriva
  file_name_template: '{{ .PackageName }}-{{ .Version }}.src.rpm'
  bins:
    scriva: '%{goipath}'
snapshot:
  version_template: '{{ incpatch .Version }}-snapshot'
checksum:
  name_template: checksums.txt
  algorithm: sha256
dockers_v2:
  - id: scriva
    ids:
      - scriva
    dockerfile: Dockerfile
    images:
      - ghcr.io/srjn45/scriva
      - docker.io/srjn45/scriva
    tags:
      - '{{ .Tag }}'
      - latest
    labels:
      org.opencontainers.image.created: '{{ .Date }}'
      org.opencontainers.image.revision: '{{ .Commit }}'
      org.opencontainers.image.source: https://github.com/srjn45/scriva
      org.opencontainers.image.title: ScrivaDB
      org.opencontainers.image.version: '{{ .Version }}'
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: "true"
    retry:
      attempts: 10
      delay: 10s
      max_delay: 5m0s
docker_digest:
  name_template: digests.txt
changelog:
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  sort: asc
  format: '{{ .SHA }} {{ .Message }}'
dist: dist
docker_signs:
  - id: default
    cmd: cosign
    args:
      - sign
      - ${artifact}
      - --yes
    artifacts: manifests
env_files:
  github_token: ~/.config/goreleaser/github_token
  gitlab_token: ~/.config/goreleaser/gitlab_token
  gitea_token: ~/.config/goreleaser/gitea_token
before:
  hooks:
    - go mod tidy
source:
  name_template: '{{ .ProjectName }}-{{ .Version }}'
  format: tar.gz
gomod:
  gobinary: go
announce:
  twitter:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  mastodon:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    server: ""
  reddit:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    url_template: '{{ .ReleaseURL }}'
  slack:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: GoReleaser
  discord:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    author: GoReleaser
    color: "3888754"
    icon_url: https://goreleaser.com/static/avatar.png
  teams:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    color: '#2D313E'
    icon_url: https://goreleaser.com/static/avatar.png
  smtp:
    subject_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    body_template: 'You can view details from: {{ .ReleaseURL }}'
  mattermost:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    color: '#2D313E'
    username: GoReleaser
  linkedin:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  telegram:
    message_template: '{{ print .ProjectName " " .Tag " is out! Check it out at " .ReleaseURL | mdv2escape }}'
    parse_mode: MarkdownV2
  webhook:
    message_template: '{ "message": "{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}"}'
    content_type: application/json; charset=utf-8
    expected_status_codes:
      - 200
      - 201
      - 202
      - 204
  opencollective:
    title_template: '{{ .Tag }}'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out!<br/>Check it out at <a href="{{ .ReleaseURL }}">{{ .ReleaseURL }}</a>'
  bluesky:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  discourse:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: system
git:
  tag_sort: -version:refname
mcp:
  name: ""
  title: ""
  auth:
    type: none
retry:
  attempts: 10
  delay: 10s
  max_delay: 5m0s
github_urls:
  download: https://github.com
gitlab_urls:
  download: https://gitlab.com
