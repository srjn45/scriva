version: "2"

linters:
  # errcheck, govet, staticcheck, unused, ineffassign are all enabled by default.
  # Add a few extras that catch real bugs without being noisy.
  enable:
    - bodyclose     # HTTP response body not closed
    - copyloopvar   # loop variable capture bugs
    - errorlint     # incorrect error wrapping (Go 1.13+)
    - nilerr        # returns nil instead of the error variable
    - misspell      # common spelling mistakes in comments/strings
    - staticcheck   # SA* and S* checks (explicitly enabled, previously default)
    - govet         # reports suspicious constructs (explicitly enabled)
  exclusions:
    paths:
      - internal/pb  # generated protobuf code
    rules:
      # Test files can use unchecked errors freely (Close, Append, Insert, etc.)
      - path: "_test\\.go$"
        linters:
          - errcheck

formatters:
  exclusions:
    paths:
      - internal/pb  # generated protobuf code
